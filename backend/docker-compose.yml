services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
