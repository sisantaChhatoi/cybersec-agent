name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Full backend base URL the APK should talk to (e.g. http://192.168.1.37:8000 or https://xyz.ngrok-free.app). Baked in as EXPO_PUBLIC_API_URL.'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ inputs.backend_url }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (caches ~/.gradle across runs)
        uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild native Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
