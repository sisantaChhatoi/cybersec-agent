name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Full backend base URL the APK should talk to (e.g. http://192.168.1.37:8000 or https://xyz.ngrok-free.app). Baked in as EXPO_PUBLIC_API_URL.'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ inputs.backend_url }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (caches ~/.gradle across runs)
        uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild native Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Build release APK (arm64-v8a only)
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Build summary
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          SIZE=$(du -h "$APK" | cut -f1)
          {
            echo "## 📦 Android APK build"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| APK size | $SIZE |"
            echo "| ABI | arm64-v8a |"
            echo "| Backend URL | \`$EXPO_PUBLIC_API_URL\` |"
            echo "| Commit | \`${GITHUB_SHA::7}\` |"
            echo "| Run | #${GITHUB_RUN_NUMBER} |"
            echo "| Artifact (needs GitHub login) | ${{ steps.upload.outputs.artifact-url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
